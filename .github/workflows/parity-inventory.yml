name: Parity Inventory

# Implements ADR-0006 §D.1: weekly inventory of the prod
# `vfeeg-development/vfeeg-backend` image vs this fork's source tree.
# Opens (or updates) an issue with label `parity-gap` when drift is
# detected.
#
# Requires repo secret PARITY_PAT_GHCR_READ — a PAT with
# `read:packages` scope on the vfeeg-development org. Generated by
# matthiasm, stored as repo secret.

on:
  schedule:
    # Mondays 04:15 UTC — well before working hours so the issue is
    # waiting in the morning. Avoid :00 / :30 to dodge cron-load
    # spikes on the GHA runner pool.
    - cron: '15 4 * * 1'
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

env:
  PROD_IMAGE_REF: ghcr.io/vfeeg-development/vfeeg-backend
  REPORT_PATH: parity-report.md
  ISSUE_LABEL: parity-gap
  ISSUE_TITLE_PREFIX: '[Parity] vfeeg-backend drift'

jobs:
  inventory:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.25'
          check-latest: true

      - name: Install crane + redress
        run: |
          go install github.com/google/go-containerregistry/cmd/crane@latest
          go install github.com/goretk/redress@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Authenticate crane to GHCR (vfeeg-development read)
        env:
          GHCR_PAT: ${{ secrets.PARITY_PAT_GHCR_READ }}
        run: |
          if [ -z "$GHCR_PAT" ]; then
            echo "::error::Secret PARITY_PAT_GHCR_READ is not set. Create a PAT with 'read:packages' scope on vfeeg-development and add it as a repo secret."
            exit 1
          fi
          mkdir -p ~/.docker
          # Basic-auth blob; crane reads ~/.docker/config.json.
          AUTH=$(printf 'x-access-token:%s' "$GHCR_PAT" | base64 -w0)
          printf '{"auths":{"ghcr.io":{"auth":"%s"}}}' "$AUTH" > ~/.docker/config.json
          chmod 600 ~/.docker/config.json

      - name: Run inventory
        env:
          PROD_IMAGE_REF: ${{ env.PROD_IMAGE_REF }}
          FORK_ROOT: ${{ github.workspace }}
          OUT_REPORT: ${{ env.REPORT_PATH }}
        run: |
          chmod +x scripts/parity-inventory.sh
          scripts/parity-inventory.sh

      - name: Upload report artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: parity-report
          path: ${{ env.REPORT_PATH }}
          retention-days: 90

      - name: Open or update parity-gap issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          # Only act if the report names at least one drift item.
          # The script writes a "No gaps detected" block when clean.
          if grep -q "^## ✅ No gaps detected" "${{ env.REPORT_PATH }}"; then
            echo "No drift — closing any stale parity-gap issues."
            gh issue list --label "${{ env.ISSUE_LABEL }}" --state open --json number --jq '.[].number' \
              | while read -r n; do
                  gh issue close "$n" --reason "completed" \
                    --comment "Automatic close: parity-inventory found no drift on $(date -u +'%Y-%m-%d')."
                done
            exit 0
          fi

          # Find or create the open issue for this report cycle.
          # Strategy: one issue per cycle (week). Re-using is fine
          # because the body is overwritten with the latest report.
          ISSUE_NUMBER=$(gh issue list --label "${{ env.ISSUE_LABEL }}" --state open \
              --json number --jq '.[0].number // empty')

          TITLE="${{ env.ISSUE_TITLE_PREFIX }} ($(date -u +'%Y-%m-%d'))"
          BODY_FILE="${{ env.REPORT_PATH }}"

          if [ -n "$ISSUE_NUMBER" ]; then
            echo "Updating existing issue #$ISSUE_NUMBER"
            gh issue edit "$ISSUE_NUMBER" --title "$TITLE" --body-file "$BODY_FILE"
          else
            echo "Creating new parity-gap issue"
            gh issue create --title "$TITLE" --body-file "$BODY_FILE" --label "${{ env.ISSUE_LABEL }}"
          fi
